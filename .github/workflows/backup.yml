name: Weekly Database Backup

on:
  schedule:
    # Domingo 2:00 AM Colombia (UTC-5) = 07:00 UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      issues: write   # ✅ AÑADIDO: necesario para crear issues en caso de fallo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          pg_dump --version

      - name: Generate backup filename
        id: backup-name
        run: |
          FILENAME="backup_$(date +%Y%m%d_%H%M%S).dump"
          DATE="$(date +%Y-%m-%d)"
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "Generated filename: ${FILENAME}"

      - name: Create PostgreSQL backup
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          PGPORT: 5432                              # ✅ Puerto explícito
          PGSSLMODE: require                        # ✅ SSL requerido por Supabase
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          pg_dump \
            -h "db.${PROJECT_ID}.supabase.co" \
            -U postgres \
            -p 5432 \
            -d postgres \
            -F c \
            --no-password \
            -f "${{ steps.backup-name.outputs.filename }}"

          echo "✅ Backup created"
          ls -lh "${{ steps.backup-name.outputs.filename }}"

      # ✅ AÑADIDO: verificar que el backup no esté vacío
      - name: Verify backup integrity
        run: |
          FILE="${{ steps.backup-name.outputs.filename }}"
          SIZE=$(stat -c%s "${FILE}")
          echo "Backup size: ${SIZE} bytes"
          if [ "${SIZE}" -lt 1024 ]; then
            echo "❌ Backup file is suspiciously small (${SIZE} bytes)"
            exit 1
          fi
          echo "✅ Backup integrity check passed"

      - name: Compress backup
        run: |
          gzip "${{ steps.backup-name.outputs.filename }}"
          ls -lh "${{ steps.backup-name.outputs.filename }}.gz"

      - name: Upload backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ steps.backup-name.outputs.date }}
          path: ${{ steps.backup-name.outputs.filename }}.gz
          retention-days: 90
          if-no-files-found: error   # ✅ Falla explícitamente si no hay archivo

      - name: Cleanup old artifacts (keep last 12)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const backupArtifacts = artifacts.data.artifacts
              .filter(a => a.name.startsWith('database-backup-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            console.log(`Found ${backupArtifacts.length} backup artifact(s) total`);

            const toDelete = backupArtifacts.slice(12);

            if (toDelete.length === 0) {
              console.log('No old backups to delete');
              return;
            }

            for (const artifact of toDelete) {
              console.log(`Deleting: ${artifact.name} (created: ${artifact.created_at})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }
            console.log(`✅ Deleted ${toDelete.length} old backup(s)`);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ Database Backup Failed - ${new Date().toISOString().split('T')[0]}`,
                body: [
                  '## Automated backup failed',
                  '',
                  `**Date:** ${new Date().toISOString()}`,
                  `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  'Please investigate and restore manually if needed.'
                ].join('\n'),
                labels: ['backup', 'urgent']
              });
            } catch (err) {
              console.error('Failed to create issue:', err.message);
            }
