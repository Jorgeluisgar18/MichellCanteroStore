name: Weekly Database Backup

on:
  schedule:
    # Every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Generate backup filename
        id: backup-name
        run: |
          echo "filename=backup_$(date +%Y%m%d_%H%M%S).sql" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Export database schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Export schema using Supabase CLI
          supabase db dump \
            --project-id $SUPABASE_PROJECT_ID \
            --schema public \
            > ${{ steps.backup-name.outputs.filename }}
          
          # Compress backup
          gzip ${{ steps.backup-name.outputs.filename }}
          
          echo "Backup created: ${{ steps.backup-name.outputs.filename }}.gz"
          ls -lh ${{ steps.backup-name.outputs.filename }}.gz

      - name: Upload backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ steps.backup-name.outputs.date }}
          path: ${{ steps.backup-name.outputs.filename }}.gz
          retention-days: 90 # Keep for 3 months

      # Optional: Upload to Google Drive
      # Uncomment and add GDRIVE_CREDENTIALS secret to enable
      # - name: Upload to Google Drive (Optional)
      #   uses: satackey/action-google-drive@v1
      #   with:
      #     skicka-tokencache-json: ${{ secrets.GDRIVE_CREDENTIALS }}
      #     upload-from: ${{ steps.backup-name.outputs.filename }}.gz
      #     upload-to: /backups/michell-cantero-store/

      # Optional: Upload to AWS S3
      # Uncomment and add AWS secrets to enable
      # - name: Upload to AWS S3 (Optional)
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: ${{ secrets.AWS_REGION }}
      #   run: |
      #     aws s3 cp \
      #       ${{ steps.backup-name.outputs.filename }}.gz \
      #       s3://${{ secrets.AWS_S3_BUCKET }}/backups/michell-cantero-store/

      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            // Keep only last 12 backups (3 months of weekly backups)
            const backupArtifacts = artifacts.data.artifacts
              .filter(a => a.name.startsWith('database-backup-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            const toDelete = backupArtifacts.slice(12);
            
            for (const artifact of toDelete) {
              console.log(`Deleting old backup: ${artifact.name}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Database Backup Failed',
              body: `Automated database backup failed on ${new Date().toISOString()}\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['backup', 'urgent']
            });
